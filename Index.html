<!DOCTYPE html>
<html>
<head>
  <script charset="utf-8" 
    src="https://static.line-scdn.net/liff/edge/2/sdk.js">
  </script>
</head>
<body>
<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxfGvu5fpSl508NwcFJBE_7FH6Ag3WvjToW3hbREf28ZnyNUh4Q26iBwYgOcHXwlTym/exec"; // ← URL จริงของคุณ
  const LIFF_ID = "1656418068-mQg62cpf"; // ← LIFF ID ของคุณ

  liff.init({ liffId: LIFF_ID })
    .then(() => {
      // ส่ง LIFF token ไปด้วยเพื่อให้ Apps Script รู้จักตัวตน
      const token = liff.getAccessToken();
      window.location.href = APPS_SCRIPT_URL + "?token=" + token;
    })
    .catch(err => {
      // ถ้าไม่ได้เปิดใน LINE ก็ redirect ปกติ
      window.location.href = APPS_SCRIPT_URL;
    });
</script>
</body>
</html>
