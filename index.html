<!DOCTYPE html>
<html>
<head>
  <script charset="utf-8" 
    src="https://static.line-scdn.net/liff/edge/2/sdk.js">
  </script>
</head>
<body>
<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/xxx/exec";
  const LIFF_ID = "1656418068-mQg62cpf";

  liff.init({ liffId: LIFF_ID })
    .then(() => {
      // ✅ บังคับเปิดใน External Browser (Chrome/Safari)
      // แทนที่จะเปิดใน LINE browser
      if (liff.isInClient()) {
        liff.openWindow({
          url: APPS_SCRIPT_URL,
          external: true  // ← นี่คือ key สำคัญ
        });
      } else {
        window.location.href = APPS_SCRIPT_URL;
      }
    })
    .catch(() => {
      window.location.href = APPS_SCRIPT_URL;
    });
</script>
</body>
</html>
